<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday Angel 💖</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            cursor: pointer;
        }

        /* HEART OUTLINE */
        .heart {
            position: relative;
            width: 220px;
            height: 220px;
            transform: rotate(-45deg) scale(0);
            animation: buildHeart 2s forwards;
        }

        .heart::before,
        .heart::after {
            content: "";
            position: absolute;
            width: 220px;
            height: 220px;
            border: 5px solid red;
            border-radius: 50%;
            background: transparent;
        }

        .heart::before {
            top: -110px;
            left: 0;
        }

        .heart::after {
            left: 110px;
            top: 0;
        }

        .heart {
            border: 5px solid red;
            background: transparent;
        }

        @keyframes buildHeart {
            100% {
                transform: rotate(-45deg) scale(1);
            }
        }

        /* TEXT */
        .text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 45px;
            font-weight: bold;
            text-align: center;
            opacity: 0;
            animation: showText 2s 2s forwards;
        }

        @keyframes showText {
            to {
                opacity: 1;
            }
        }

        /* STARS */
        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            animation: fall linear infinite;
        }

        @keyframes fall {
            from { transform: translateY(-10px); }
            to { transform: translateY(100vh); }
        }

    </style>
</head>

<body onclick="playMusic()">

<!-- HEART -->
<div class="heart"></div>

<!-- TEXT -->
<div class="text">Happy Birthday<br>Angel 💖</div>

<!-- MUSIC -->
<audio id="music" loop>
    <source src="kesariya.mp3" type="audio/mpeg">
</audio>

<script>
    // PLAY MUSIC ON CLICK
    function playMusic() {
        document.getElementById("music").play();
    }

    // STARS
    for (let i = 0; i < 120; i++) {
        let star = document.createElement("div");
        star.className = "star";
        star.style.left = Math.random() * 100 + "vw";
        star.style.animationDuration = (Math.random() * 3 + 2) + "s";
        star.style.opacity = Math.random();
        document.body.appendChild(star);
    }
</script>

</body>
</html>
