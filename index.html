<!DOCTYPE html>
<html>
<head>
    <title>Special Wish</title>

    <style>
        body {
            margin: 0;
            background: black;
            font-family: Arial;
            overflow: hidden;
        }

        /* BUTTON CENTER */
        button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 30px;
            font-size: 22px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, red, orange);
            color: white;
            cursor: pointer;
            box-shadow: 0 0 20px red;
        }

        /* BIG CENTER NAME */
        #name {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 100px;
            font-weight: bold;
            color: pink;
            text-shadow: 0 0 30px red, 0 0 60px orange;
            animation: zoomIn 1.2s forwards;
        }

        @keyframes zoomIn {
            to {
                transform: translate(-50%, -50%) scale(1);
            }
        }

        /* MESSAGE BELOW */
        #message {
            display: none;
            position: absolute;
            top: 70%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 30px;
            color: white;
            opacity: 0.9;
        }

        /* HEARTS */
        .heart {
            position: absolute;
            font-size: 24px;
            color: pink;
            animation: floatUp 5s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-700px); opacity: 0; }
        }
    </style>
</head>

<body>

<!-- 🎵 Music -->
<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<button onclick="startWish()">Click Me 🔥</button>

<div id="name">Angel 💖</div>
<div id="message">🎉 Happy Birthday 🎉</div>

<script>
function startWish() {

    // Hide button
    document.querySelector("button").style.display = "none";

    // Play music (Kesariya instrumental)
    document.getElementById("bgMusic").play();

    // Show BIG center name
    let name = document.getElementById("name");
    name.style.display = "block";

    // Show message after 2 sec
    setTimeout(() => {
        document.getElementById("message").style.display = "block";
    }, 2000);

    // Floating hearts
    setInterval(() => {
        let heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤";
        heart.style.left = Math.random() * window.innerWidth + "px";
        heart.style.bottom = "0px";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 5000);
    }, 300);
}
</script>

</body>
</html>
